filters:
  departamento: Antioquia
  municipio: Medellin
  entidad: Juzgado de Circuito
  especialidad: Civil

runtime:
  headless: true
  timeout_ms: 30000
  retry_attempts: 3
  throttle_ms: 1200
  timezone: America/Bogota

matching:
  fuzzy_threshold_accept: 0.90
  fuzzy_threshold_review: 0.80

output:
  save_raw_pdf: true
  save_parsed_json: true
  export_csv: true
  export_json: true

# Defaults para ejecución completa — se usan cuando no se pasan por CLI
defaults:
  enrich_file_2023: input/ANTIOQUIA_2023.TXT
  enrich_file_2025: input/ANTIOQUIA_2025.TXT
  draft_emails: true
  gog_account: mdetech01@gmail.com
  draft_filter: all_with_email
  firma_nombre: "[NOMBRE BUFETE]"
  abogado_nombre: "[NOMBRE DEL ABOGADO]"
  abogado_email: mdetech01@gmail.com
  sheets_report: true
