[pytest]
testpaths = tests
markers =
    unit: fast tests with no external dependencies
    integration: tests that require PostgreSQL
    qa_e2e: end-to-end pipeline tests with mocked HTTP and real DB
    qa_stress: stress and concurrency tests requiring PostgreSQL
    qa_data_flow: data round-trip integrity tests
    qa_schema: schema safety and migration tests
    qa_config: configuration conflict tests (no DB needed)
    qa_regression: regression guard tests
addopts = --tb=short
